name: Lint JSON

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if announcements.json changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD | grep -q 'announcements.json'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "announcements.json not changed, skipping lint"
          fi

      - name: Validate JSON files
        if: steps.check.outputs.changed == 'true'
        run: |
          if ! python3 -m json.tool announcements.json > /dev/null 2>&1; then
            echo "::error file=announcements.json::Invalid JSON syntax"
            python3 -m json.tool announcements.json 2>&1 || true
            exit 1
          fi
          echo "✓ announcements.json is valid"
