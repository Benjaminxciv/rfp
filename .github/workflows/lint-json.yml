name: Lint JSON

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate announcements.json
        run: |
          if [ -f announcements.json ]; then
            python3 -m json.tool announcements.json > /dev/null && echo "✓ announcements.json is valid"
          else
            echo "✓ No announcements.json to validate"
          fi
